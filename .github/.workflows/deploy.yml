name: Deploy senaycreatives.com

# senaycreatives.com is ONE SvelteKit app — UI + /api routes in the same Node
# server. On every push to main we build it with @sveltejs/adapter-node into a
# standalone build/index.js, then FTP it to the cPanel Passenger Node app whose
# Application Root is public_html/. Deps are bundled into build/ (ssr.noExternal),
# so no node_modules upload and no server-side npm install.
#
# cPanel Node app settings this expects:
#   Application root:         public_html
#   Application startup file: app.cjs   (NOT build/index.js — ESM + top-level
#                             await can't be require()d by lsnode.js)
#   Env vars (set in cPanel, read at runtime via $env/dynamic/*):
#     ORIGIN=https://senaycreatives.com   <- required, or form POSTs fail CSRF
#     DATABASE_URL, SMTP creds, etc.

on:
  push:
    branches:
      - main
  workflow_dispatch: {} # allow manual re-deploys from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    # FTP_SERVER / FTP_USERNAME / FTP_PASSWORD (+ optional FTP_SERVER_DIR,
    # FTP_PORT, FTP_PROTOCOL) live in this GitHub Environment; the job must
    # declare it or secrets.* read empty.
    environment: SenayCreatives

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # No build-time secrets: all config is read at RUNTIME from the
      # Passenger app's environment.
      - name: Build
        run: |
          npm ci
          npm run build

      # Assemble the (small) payload: self-contained build/, manifests purely
      # as an npm-install fallback, the CJS launcher, and a restart trigger.
      - name: Stage payload
        run: |
          mkdir -p deploy/tmp
          cp -r build              deploy/build
          cp package.json          deploy/package.json
          cp package-lock.json     deploy/package-lock.json
          # CommonJS launcher: Passenger's lsnode.js require()s the startup
          # file, which crashes on adapter-node's ESM + top-level await.
          # app.cjs must contain:  import('./build/index.js')
          cp app.cjs               deploy/app.cjs
          # Changing content forces the FTP delta-sync to re-upload this file,
          # refreshing its mtime so Passenger restarts and serves the new build.
          echo "restart ${GITHUB_SHA} $(date +%s)" > deploy/tmp/restart.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          # Prefer ftps — set FTP_PROTOCOL=ftps if the host supports TLS so
          # credentials aren't sent in plaintext on every deploy.
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          # Be patient with a busy/throttling cPanel control socket.
          timeout: 120000
          local-dir: ./deploy/
          # public_html relative to the FTP account's landing directory.
          # If the FTP account is scoped to public_html itself, leave the
          # secret unset and this defaults to ./
          server-dir: ${{ secrets.FTP_SERVER_DIR || './public_html/' }}
          # Never upload node_modules (slow), protect the symlink CloudLinux
          # Node Selector keeps in the app root, and never touch .env or
          # cPanel-managed dotfiles like .htaccess.
          exclude: |
            **/node_modules/**
            **/.env
            **/.git/**
            **/.htaccess
            **/.well-known/**
