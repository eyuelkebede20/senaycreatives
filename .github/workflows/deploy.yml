name: Deploy senaycreatives.com

# This site is a Next.js (App Router) app built with `output: "standalone"`.
# On every push to main we build it, pack the self-contained bundle into ONE
# tarball, ship it over SSH (seconds, vs ~20 min FTP-ing thousands of files),
# and extract + restart on the cPanel CloudLinux Node app.
#
# cPanel Node app settings this expects (set once, in the UI):
#   Application root:         api/senaypageapi   (a folder beside public_html;
#                             cPanel won't run a Node app from the domain docroot)
#   Application startup file: app.cjs                (NOT server.js directly)
#   Node.js version:          22.x
#   Environment variables (read at boot by the app):
#     NEXT_PUBLIC_SITE_URL=https://senaycreatives.com
#     DATABASE_URL, SMTP_*, NOTIFY_TO, UPLOAD_DIR  (see .env.example)
#   Do NOT click "Run NPM Install" — we ship our own node_modules under app/.
#
# Required GitHub secrets (Settings → Environments → SenayCreatives):
#   SSH_HOST          the SSH host (often same as the FTP host)
#   SSH_USER          cPanel username
#   SSH_PRIVATE_KEY   private key authorized on the account (see DEPLOY.md)
#   Optional: SSH_PORT (defaults to 22)
# Optional repo variable: SITE_URL (defaults to https://senaycreatives.com).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The deploy secrets live in this GitHub Environment; the job must declare it.
    environment: SenayCreatives

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (standalone)
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://senaycreatives.com' }}
        run: pnpm build

      - name: Assemble deploy payload
        run: |
          set -e
          # The self-contained bundle (incl. its real node_modules) goes in a
          # SUBFOLDER app/, so it never collides with the CloudLinux-managed
          # node_modules symlink at the app root (senay/node_modules).
          rm -rf deploy && mkdir -p deploy/app
          # Self-contained server + its traced node_modules + hidden .next/server.
          cp -r .next/standalone/. deploy/app/
          # Static assets Next does not copy into the standalone output.
          mkdir -p deploy/app/.next/static
          cp -r .next/static/. deploy/app/.next/static/
          # Public assets (logo, etc.).
          if [ -d public ]; then cp -r public deploy/app/public; fi
          # Passenger launcher at the app root — boots deploy/app/server.js.
          cp app.cjs deploy/app.cjs
          # Restart trigger (Passenger watches tmp/restart.txt).
          mkdir -p deploy/tmp
          echo "restart ${GITHUB_SHA} ${GITHUB_RUN_NUMBER}" > deploy/tmp/restart.txt

      - name: Pack bundle
        run: tar -C deploy -czf bundle.tgz .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT || 22 }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload, extract, restart
        env:
          PORT: ${{ secrets.SSH_PORT || 22 }}
          DEST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          APP_ROOT: api/senaypageapi
        run: |
          set -e
          SSH_OPTS="-p $PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          # One ~15 MB file over the wire instead of thousands of FTP transfers.
          scp -P "$PORT" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            bundle.tgz "$DEST:$APP_ROOT/bundle.tgz"
          # Extract server-side. Replace app/ + app.cjs only; never touch the
          # CloudLinux-managed node_modules symlink at the app root.
          ssh $SSH_OPTS "$DEST" "set -e; \
            cd \"\$HOME/$APP_ROOT\"; \
            rm -rf app app.cjs; \
            tar -xzf bundle.tgz; \
            rm -f bundle.tgz; \
            mkdir -p tmp; date > tmp/restart.txt; \
            cloudlinux-selector restart --json --interpreter nodejs --app-root \"$APP_ROOT\" >/dev/null 2>&1 || true"
